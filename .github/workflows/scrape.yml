name: NCAA Data Pipeline

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  scrape_to_data_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main # Pull code from main

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pandas cbbpy requests beautifulsoup4 lxml html5lib

      - name: Run NCAA Scraper
        run: python fetch_ncaa.py

      - name: Deploy to Data Branch
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: data # The CSV will live here
          FOLDER: .
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MESSAGE: "Update NCAA Data: $(date)"
          SKIP_EMPTY_COMMITS: true